services:
  redis:
    image: redis:latest
    container_name: valoguess-socket-server-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    restart: unless-stopped
  socket-server:
    build: .
    container_name: valoguess-socket-server

    restart: unless-stopped

    ports:
      - "5000:5000"
    depends_on:
      - redis
